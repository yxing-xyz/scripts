patch:
  __patch:
  "key_binder/bindings":
      __patch:
        - "key_bindings:/emacs_editing"
  ascii_composer:
    initial_mode: ascii # 默认进入英文输入状态
  ascii_composer/switch_key:
    #Shift_L: noop # 把「左 Shift 键」完全禁用/废弃掉
    Shift_L: commit_code # 左 Shift 切换中英文
  key_binder/bindings/+:
    - { when: always, accept: Shift_R, toggle: full_shape } # 开启Shift_R切换全角半角
    - { when: composing, accept: "-", send: Page_Up }
    - { when: composing, accept: "=", send: Page_Down }
    # - { accept: Tab, send: Select, when: has_menu }
    - { when: has_menu, accept: Tab, send: space }
  good_old_caps_lock: false # 不要开启caps切换中英文
  punctuator:
    full_shape: []
    half_shape: []
  "menu/page_size": 7
